apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: production-ssv-staking-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: production
  source:
    repoURL: "https://chartmuseum.ops.ssvlabsinternal.com"
    targetRevision: 0.1.5
    chart: ssv-staking-app
    helm:
      releaseName: ssv-staking-app
      values: |-
        fullnameOverride: ssv-staking-app
        replicas: 1
        resources:
          requests:
            cpu: 400m
            memory: 812Mi
          limits:
            cpu: 2
            memory: 3Gi
        envs:
          NEXT_PUBLIC_SSV_API: https://api.hoodi.ssv.network/api/v4/hoodi
          NEXT_PUBLIC_APP_ENV: Hoodi
          NEXT_PUBLIC_SSV_TOKEN_ADDRESS: "0x9F5d4Ec84fC4785788aB44F9de973cF34F7A038e"
          NEXT_PUBLIC_CSSV_TOKEN_ADDRESS: "0x6e1a5d27361c666f681af06535c8Ac773E571d4d"
          NEXT_PUBLIC_STAKING_ADDRESS: "0x58410Bef803ECd7E63B23664C586A6DB72DAf59c"
          NEXT_PUBLIC_VIEWS_ADDRESS: "0x5AdDb3f1529C5ec70D77400499eE4bbF328368fe"
          NEXT_PUBLIC_RPC_URL: "https://ethereum-hoodi-rpc.publicnode.com/d8a2cc6e7483872e917d7899f9403d738b001c80e37d66834f4e40e9efb54a27"
          NEXT_PUBLIC_CHAIN_ID: "560048"
        image:
          repository: 764289642555.dkr.ecr.us-west-2.amazonaws.com/ssv-staking-app
          tag: 3005749fa791b265baee5b0bcae2b1b23a155dde
        networkPolicy:
          ingressNamespace: kube-system
          ingressControllerInstance: f5-nginx-ingress
          egress:
            extraEgress:
              - {}
        ingress:
          enabled: true
          className: "nginx-f5"
          annotations:
            cert-manager.io/cluster-issuer: "letsencrypt-prod"
          hosts:
            - host: stake.ssv.network
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: ssv-staking-app-external-tls
              hosts:
                - stake.ssv.network
  destination:
    name: production
    namespace: ssv-staking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
